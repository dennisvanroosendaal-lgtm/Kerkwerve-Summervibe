<style>
:root{
  --black:#0a0a0a;--mid:#111111;--off-white:#f5f0e8;--yellow:#ffdd00;
  --ember:#e8572a;--muted:rgba(245,240,232,0.38);
  --fd:'Bebas Neue','Arial Black',sans-serif;
  --fm:'Space Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--off-white);font-family:var(--fm);overflow-x:hidden}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:60px;display:flex;align-items:stretch;
  background:rgba(10,10,10,0.97);
  border-bottom:1px solid rgba(255,221,0,0.12);
}
.nav-brand{display:flex;align-items:center;padding:0 28px;flex:1}
.nav-brand-text{font-family:var(--fd);font-size:13px;letter-spacing:3px;line-height:1.25;color:var(--off-white)}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;padding:0 28px}
.nav-links a{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--yellow)}
.nav-cta{
  display:flex;align-items:center;
  background:var(--yellow);color:var(--black);
  font-family:var(--fd);font-size:13px;letter-spacing:4px;
  padding:0 32px;text-decoration:none;white-space:nowrap;transition:opacity .2s;
}
.nav-cta:hover{opacity:.88}

/* HERO — volledige viewport, tekst bovenaan direct na nav */
.hero{
  position:relative;
  height:100vh;
  display:flex;flex-direction:column;
  justify-content:flex-start;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center 30%;
  z-index:0;filter:brightness(.62) saturate(1.1);
}
.hero-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom,
    rgba(10,10,10,.7) 0%,
    rgba(10,10,10,.2) 35%,
    rgba(10,10,10,.5) 70%,
    rgba(10,10,10,1) 100%);
}
.hero-content{
  position:relative;z-index:2;
  padding:80px 40px 0; /* 60px nav + 20px gap */
  max-width:960px;
}
.hero-eyebrow{
  font-family:var(--fm);font-size:10px;letter-spacing:6px;
  color:var(--yellow);text-transform:uppercase;margin-bottom:16px;
  opacity:0;animation:fadeUp .6s ease forwards .2s;
}
.hero-title{
  font-family:var(--fd);font-size:clamp(72px,15vw,168px);
  line-height:.88;letter-spacing:-2px;
  text-shadow:0 4px 48px rgba(0,0,0,.7);margin-bottom:12px;
  opacity:0;animation:fadeUp .7s ease forwards .4s;
}
.hero-title .yellow{color:var(--yellow)}
.hero-sub{
  font-family:var(--fm);font-size:10px;letter-spacing:5px;
  color:var(--muted);text-transform:uppercase;margin-bottom:32px;
  opacity:0;animation:fadeUp .6s ease forwards .7s;
}
.hero-info{
  display:flex;gap:48px;flex-wrap:wrap;margin-bottom:32px;
  opacity:0;animation:fadeUp .6s ease forwards .9s;
}
.hi{display:flex;flex-direction:column;gap:3px}
.hi-label{font-family:var(--fm);font-size:9px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.hi-value{font-family:var(--fd);font-size:20px;letter-spacing:2px}
.hero-btns{
  display:flex;gap:12px;flex-wrap:wrap;
  opacity:0;animation:fadeUp .6s ease forwards 1.1s;
}
.btn-yel{
  display:inline-flex;align-items:center;gap:8px;padding:15px 40px;
  background:var(--yellow);color:var(--black);
  font-family:var(--fd);font-size:14px;letter-spacing:4px;
  text-decoration:none;box-shadow:0 8px 28px rgba(255,221,0,.28);
  transition:transform .2s,box-shadow .2s;
}
.btn-yel:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(255,221,0,.42)}
.btn-wht{
  display:inline-flex;align-items:center;padding:14px 40px;
  border:2px solid rgba(245,240,232,.3);color:var(--off-white);
  font-family:var(--fd);font-size:14px;letter-spacing:4px;
  text-decoration:none;transition:border-color .2s,color .2s;
}
.btn-wht:hover{border-color:var(--yellow);color:var(--yellow)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* TICKER — na hero, niet fixed */
.ticker{overflow:hidden;white-space:nowrap;padding:11px 0;background:var(--yellow)}
.ticker-inner{display:inline-block;animation:tick 28s linear infinite}
.ticker-inner span{font-family:var(--fd);font-size:14px;letter-spacing:5px;color:var(--black);padding:0 24px}
.tdot{color:rgba(0,0,0,.3)}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SECTIONS */
.sec-inner{max-width:900px;margin:0 auto;padding:80px 40px}
.s-eyebrow{font-family:var(--fm);font-size:9px;letter-spacing:6px;color:var(--yellow);text-transform:uppercase;margin-bottom:10px}
.s-title{font-family:var(--fd);font-size:clamp(44px,7vw,88px);line-height:.9;margin-bottom:24px}
.s-rule{width:48px;height:3px;background:var(--yellow);margin-bottom:44px}

/* LINE-UP */
.sec-lineup{background:var(--black);position:relative;overflow:hidden}
.lineup-watermark{
  position:absolute;right:-20px;top:50%;transform:translateY(-50%);
  width:340px;pointer-events:none;filter:invert(1) brightness(10);opacity:0.04;
}
.lu-item{
  display:grid;grid-template-columns:1fr 2px 1fr;
  align-items:center;column-gap:40px;
  padding:28px 0;border-bottom:1px solid rgba(245,240,232,.07);
}
.lu-item:first-child{border-top:1px solid rgba(245,240,232,.07)}
.lu-item:hover .lu-name{color:var(--yellow)}
.lu-time{
  font-family:var(--fd);font-size:clamp(22px,3.5vw,42px);
  letter-spacing:2px;color:rgba(245,240,232,.45);
  text-align:right;
}
.lu-bar{width:2px;background:var(--ember);height:32px;justify-self:center}
.lu-name{
  font-family:var(--fd);font-size:clamp(22px,3.5vw,42px);
  line-height:1;color:var(--off-white);transition:color .2s;padding-left:4px;
}

/* TICKETS */
.sec-tickets{background:var(--mid)}
.ticket-box{
  max-width:540px;margin:0 auto;
  background:rgba(255,221,0,.04);border:1px solid rgba(255,221,0,.18);
  padding:52px 44px;text-align:center;
}
.ticket-name{font-family:var(--fd);font-size:64px;line-height:.9;margin-bottom:16px}
.ticket-sub{font-family:var(--fm);font-size:11px;letter-spacing:.5px;line-height:2.2;color:var(--muted);margin-bottom:32px}

/* MERCH */
.sec-merch{background:var(--black)}
.merch-price{display:inline-block;background:var(--yellow);color:var(--black);font-family:var(--fd);font-size:56px;padding:2px 20px;margin-bottom:12px}
.merch-sub{font-family:var(--fm);font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:16px;line-height:1.9}
.merch-dots{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.mdot{display:flex;align-items:center;gap:6px;font-family:var(--fd);font-size:12px;letter-spacing:2px;color:rgba(245,240,232,.45)}
.mdot-c{width:11px;height:11px;border-radius:50%;border:1px solid rgba(245,240,232,.2)}

/* FESTIVAL INFO */
.sec-info{background:var(--mid)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px 80px}
.info-item{display:flex;gap:14px}
.info-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.info-lbl{font-family:var(--fm);font-size:9px;letter-spacing:4px;color:var(--off-white);opacity:.5;text-transform:uppercase;margin-bottom:4px}
.info-val{font-size:13px;line-height:1.8;color:var(--off-white)}
.info-val a{color:var(--yellow);text-decoration:none}
.btn-maps{
  display:inline-block;margin-top:36px;padding:13px 28px;
  border:2px solid rgba(255,221,0,.35);color:var(--yellow);
  font-family:var(--fd);font-size:12px;letter-spacing:3px;
  text-decoration:none;transition:background .2s;
}
.btn-maps:hover{background:rgba(255,221,0,.08)}

/* FOOTER */
footer{background:var(--black);border-top:1px solid rgba(245,240,232,.06);padding:48px 40px;text-align:center}
.ft-logo{font-family:var(--fd);font-size:clamp(22px,4vw,48px);letter-spacing:4px;color:var(--yellow);margin-bottom:6px}
.ft-tag{font-family:var(--fm);font-size:10px;letter-spacing:5px;color:var(--muted);margin-bottom:28px}
.ft-links{display:flex;gap:24px;justify-content:center;list-style:none;margin-bottom:24px;flex-wrap:wrap}
.ft-links a{font-family:var(--fd);font-size:13px;letter-spacing:3px;color:var(--muted);text-decoration:none;transition:color .2s}
.ft-links a:hover{color:var(--yellow)}
.ft-copy{font-family:var(--fm);font-size:10px;letter-spacing:1px;color:rgba(245,240,232,.18)}

/* MOBILE */
@media(max-width:768px){
  nav{height:56px}.nav-links{display:none}
  .nav-brand{padding:0 16px}.nav-cta{padding:0 18px;font-size:12px}
  .hero-content{padding:76px 20px 0}
  .hero-info{gap:20px}
  .sec-inner{padding:56px 20px}
  .lu-item{grid-template-columns:1fr 2px 1fr;column-gap:16px}
  .lu-time,.lu-name{font-size:18px}
  .ticket-box{padding:36px 20px}.ticket-name{font-size:48px}
  .info-grid{grid-template-columns:1fr}
  footer{padding:40px 20px}
}
</style>
